name: 雲端打包與部署

on:
  push:
    branches: [ "main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      contents: write # 讓機器人有權限上傳檔案
    steps:
      - uses: actions/checkout@v4

      - name: 安裝套件與編譯
        run: |
          npm install
          npm run build # 這會產生 dist 資料夾

      - name: 打包 Windows 安裝檔
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 部署網頁版到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # 將編譯好的網頁放到網頁伺服器
